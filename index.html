<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
    />
    <link
      href="
https://cdn.jsdelivr.net/npm/basiclightbox@5.0.4/dist/basicLightbox.min.css
"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comforter&family=Roboto+Slab:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>TaskManagerByVIVTORO4OK</title>
  </head>
  <body>
    <section class="section-task">
      <div class="container">
        <h1 class="title">Мої справи</h1>
        <form class="controls-form">
          <input
            class="task-input"
            type="text"
            placeholder="Додайте наступне завдання..."
          />
          <button class="add" type="submit">Додати до списку</button>
        </form>
        <ul class="list"></ul>
        <button class="remove-btn btn-display-none" type="button">
          Очистити
        </button>
      </div>
    </section>
    <script src="
https://cdn.jsdelivr.net/npm/basiclightbox@5.0.4/dist/basicLightbox.min.js
"></script>
    <script type="module" src="./js/script.js" defer></script>
  </body>
</html>
